name: Lint

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Install dependencies
        run: pip install ruff
      - name: Check formatting (Black style)
        run: ruff format --check .
      - name: Run Ruff Linter (isort, unused imports, mccabe complexity)
        run: ruff check .
